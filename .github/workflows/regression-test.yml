name: Regression Test

# 触发条件：PR 提交、push 到 main、或手动运行
on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  regression-test:
    name: 核心功能回归测试
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 安装 TA-Lib 依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential wget
          wget http://prdownloads.sourceforge.net/ta-lib/ta-lib-0.4.0-src.tar.gz
          tar -xzf ta-lib-0.4.0-src.tar.gz
          cd ta-lib/
          ./configure --prefix=/usr
          make
          sudo make install
          cd ..
          rm -rf ta-lib ta-lib-0.4.0-src.tar.gz

      - name: 安装项目依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行回归测试
        id: test
        run: |
          python scripts/regression_test.py
        continue-on-error: true

      - name: 检查测试结果
        if: always()
        run: |
          if [ ${{ steps.test.outcome }} == "success" ]; then
            echo "## ✅ 回归测试通过" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| 检查项 | 状态 |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|------|" >> $GITHUB_STEP_SUMMARY
            echo "| API 方式 (analyze_stock) | ✅ 通过 |" >> $GITHUB_STEP_SUMMARY
            echo "| 命令行方式 (aishare) | ✅ 通过 |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- 测试股票: 000001 (平安银行)" >> $GITHUB_STEP_SUMMARY
            echo "- 测试时间: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
            exit 0
          else
            echo "## ❌ 回归测试失败" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "请查看上方日志了解详细信息" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
